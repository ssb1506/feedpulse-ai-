name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  BACKEND_SERVICE: feedpulse-backend
  FRONTEND_SERVICE: feedpulse-frontend

jobs:
  # ── Deploy Backend to Cloud Run ─────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker us-docker.pkg.dev

      - name: Build backend image
        run: |
          docker build \
            -f backend/Dockerfile.cloudrun \
            -t us-docker.pkg.dev/${{ env.PROJECT_ID }}/feedpulse-backend/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            backend/

      - name: Push to Container Registry
        run: |
          docker push us-docker.pkg.dev/${{ env.PROJECT_ID }}/feedpulse-backend/${{ env.BACKEND_SERVICE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image us-docker.pkg.dev/${{ env.PROJECT_ID }}/feedpulse-backend/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}" \
            --set-env-vars "KAFKA_SSL=true" \
            --set-env-vars "KAFKA_CA_CERT=${{ secrets.KAFKA_CA_CERT }}" \
            --set-env-vars "KAFKA_SERVICE_CERT=${{ secrets.KAFKA_SERVICE_CERT }}" \
            --set-env-vars "KAFKA_SERVICE_KEY=${{ secrets.KAFKA_SERVICE_KEY }}"

      - name: Show backend URL
        run: |
          gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'

  # ── Deploy Frontend to Cloud Run ────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker us-docker.pkg.dev

      - name: Get backend URL
        id: backend_url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build frontend image
        run: |
          docker build \
            -f frontend/Dockerfile.cloudrun \
            --build-arg VITE_API_URL=${{ steps.backend_url.outputs.url }} \
            -t us-docker.pkg.dev/${{ env.PROJECT_ID }}/feedpulse-frontend/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            frontend/

      - name: Push to Container Registry
        run: |
          docker push us-docker.pkg.dev/${{ env.PROJECT_ID }}/feedpulse-frontend/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image us-docker.pkg.dev/${{ env.PROJECT_ID }}/feedpulse-frontend/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2

      - name: Show frontend URL
        run: |
          echo "Frontend deployed at:"
          gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'
